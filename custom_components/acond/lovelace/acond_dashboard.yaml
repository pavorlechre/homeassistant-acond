          - entity: binary_sensor.acond_30007_tc_status_bit_4
            name: Čerp. okruh 1
          - entity: binary_sensor.acond_30007_tc_status_bit_5
            name: Čerp. okruh 2
          - entity: binary_sensor.acond_30007_tc_status_bit_8
            name: Odmrazování
          - entity: binary_sensor.acond_30007_tc_status_bit_9
            name: Bivalence
          - entity: binary_sensor.acond_30007_tc_status_bit_10
            name: Letní provoz
          - entity: binary_sensor.acond_30007_tc_status_bit_12
            name: Chlazení

      - type: entities
        title: Kompresor a chladivo
        entities:
          - entity: sensor.acond_30020_comp_rpm_max
            name: Max. otáčky / výkon
          - entity: sensor.acond_30024_comp_rpm_actual
            name: Aktuální otáčky / výkon
          - entity: sensor.acond_30075_compressor_starts
            name: Počet startů
          - entity: sensor.acond_30042_t_act_hp
            name: Kondenzační teplota
          - entity: sensor.acond_30043_t_act_lp
            name: Vypařovací teplota
          - entity: sensor.acond_30048_t_act_suction
            name: Sací teplota
          - entity: sensor.acond_30049_t_act_discharge
            name: Výtlačná teplota
          - entity: sensor.acond_30026_manual_pwm
            name: Manuální režim čerpadla
          - entity: sensor.acond_30047_eev_steps
            name: Poloha EEV
          - entity: sensor.acond_30046_fan_speed
            name: Rychlost ventilátoru
          - entity: sensor.acond_30025_actual_pwm
            name: Rychlost oběh. čerpadla

      - type: entities
        title: Bivalence
        entities:
          - entity: sensor.acond_30030_t02_eh
            name: Teplota E-heateru
          - entity: sensor.acond_30031_manual_eh
            name: Povolení bivalence – stav v TČ

      - type: entities
        title: Provozní hodiny
        entities:
          - entity: sensor.acond_30050_compressor_hours
            name: Kompresor – hodiny
          - entity: sensor.acond_30052_compressor_min
            name: Kompresor – minuty
          - entity: sensor.acond_30053_fan_hours
            name: Ventilátor – hodiny
          - entity: sensor.acond_30055_fan_min
            name: Ventilátor – minuty
          - entity: sensor.acond_30056_rv_hours
            name: Reverzní ventil – hodiny
          - entity: sensor.acond_30058_rv_min
            name: Reverzní ventil – minuty
          - entity: sensor.acond_30059_pump_hours
            name: Oběhové čerpadlo – hodiny
          - entity: sensor.acond_30061_pump_min
            name: Oběhové čerpadlo – minuty
          - entity: sensor.acond_30062_bivalence1_hours
            name: Bivalence 1 – hodiny
          - entity: sensor.acond_30064_bivalence1_min
            name: Bivalence 1 – minuty

      # --- Bivalence 2 (podmíněné – ne každé TČ má druhou bivalenci) ---
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.acond_30065_bivalence2_hours
            above: -1
        card:
          type: entities
          title: Bivalence 2
          entities:
            - entity: sensor.acond_30065_bivalence2_hours
              name: Hodiny
            - entity: sensor.acond_30067_bivalence2_min
              name: Minuty

      - type: entities
        title: Surové stavové registry (pokročilé)
        entities:
