###############################################################################
# Acond Heat Pump – Lovelace dashboard
# v0.25 (15.5.2026)
#
# Změny oproti v0.24:
#  - Sekce "Přizpůsobení dashboardu" v Nápovědě OPRAVENA: původní návod
#    skrz "Nový dashboard z YAML konfigurace" by uživatele zavedl do
#    identické pasti (yaml mode = UI editor opět zakázaný). Nový postup
#    používá storage mode dashboard + Editor kódu nastavení.
#
# Změny oproti v0.23 (v0.24):
#  - "Aplikace Acond" – iframe zrušen, jen tlačítko v novém okně
#  - "Nápověda" – přidána sekce "Přizpůsobení dashboardu"
#
# Pořadí views: Pohled → Přehled → Ovládání → Energie → Grafy →
#               Diagnostika → Aplikace Acond → Nápověda
#
# Konvence entity_id:
#   sensor.acond_{address}_{key}
#   binary_sensor.acond_{address}_{key}
#   number.acond_{address}_{key}
#   switch.acond_{address}_{key}
#   select.acond_{address}_{key}
#   button.acond_{address}_{key}
#
# Service buttony (mimo Modbus):
#   button.acond_ai_context_acond
#   button.acond_ai_context_full
#
# Nasazení: tento soubor uložit jako
#   /config/custom_components/acond/lovelace/acond_dashboard.yaml
###############################################################################

title: Acond TČ
views:

  - title: Pohled
    path: pohled
    icon: mdi:view-dashboard
    type: sections
    max_columns: 4
    sections:

      # =====================================================================
      # 1. Režim TČ – toolbar přes celou šířku view
      # =====================================================================
      - type: grid
        column_span: 4
        cards:
          # --- Heading 2 řádky: literal block scalar (zachovává newlines) ---
          - type: markdown
            content: |
              #### 🎲 Režim TČ & 🔧 Stav

              {% set m = states('sensor.acond_30014_hp_mode') %}
              {% set icon = (
                '🔴' if m == 'Vypnuto'
                else ('🟢' if m == 'Automatický'
                else ('🟠' if m == 'Pouze TČ'
                else ('🟡' if m == 'Pouze bivalence'
                else ('🔵' if m == 'Chlazení'
                else '⚪'))))) %}
              ## {{ icon }} **{{ m | upper }}**

          # --- Mode toolbar: 5× button karty s velkými ikonami ---
          - type: horizontal-stack
            cards:
              - type: button
                entity: switch.acond_40006_tc_set_bit_3
                name: VYP
                icon: mdi:power-standby
                icon_height: 60px
                show_state: false
                show_name: true
                show_icon: true
                tap_action:
                  action: perform-action
                  perform_action: switch.turn_on
                  target:
                    entity_id: switch.acond_40006_tc_set_bit_3
                  confirmation:
                    text: "Vypnout TČ? Topný systém přestane pracovat."

              - type: button
                entity: switch.acond_40006_tc_set_bit_0
                name: AUT
                icon: mdi:auto-mode
                icon_height: 60px
                show_state: false
                show_name: true
                show_icon: true
                tap_action:
                  action: perform-action
                  perform_action: switch.turn_on
                  target:
                    entity_id: switch.acond_40006_tc_set_bit_0
                  confirmation:
                    text: "Přepnout na automatický režim?"

              - type: button
                entity: switch.acond_40006_tc_set_bit_1
                name: TČ
                icon: mdi:heat-pump
                icon_height: 60px
                show_state: false
                show_name: true
                show_icon: true
                tap_action:
                  action: perform-action
                  perform_action: switch.turn_on
                  target:
                    entity_id: switch.acond_40006_tc_set_bit_1
                  confirmation:
                    text: "Přepnout na režim Pouze TČ (bez bivalence)?"

              - type: button
                entity: switch.acond_40006_tc_set_bit_2
                name: BIV
                icon: mdi:radiator
                icon_height: 60px
                show_state: false
                show_name: true
                show_icon: true
                tap_action:
                  action: perform-action
                  perform_action: switch.turn_on
                  target:
                    entity_id: switch.acond_40006_tc_set_bit_2
                  confirmation:
                    text: "Přepnout na režim Pouze bivalence (jen elektrokotel)?"

              - type: button
                entity: switch.acond_40006_tc_set_bit_4
                name: CHL
                icon: mdi:snowflake
                icon_height: 60px
                show_state: false
                show_name: true
                show_icon: true
                tap_action:
                  action: perform-action
                  perform_action: switch.turn_on
                  target:
                    entity_id: switch.acond_40006_tc_set_bit_4
                  confirmation:
                    text: "Přepnout na režim chlazení?"

      # =====================================================================
      # 2. Stav komponent – 8 binary sensorů
      # =====================================================================
      - type: grid
        cards:
          - type: heading
            heading: 🔧 Stav komponent

          - type: glance
            show_state: true
            state_color: true
            columns: 4
            entities:
              - entity: binary_sensor.acond_30045_hp_comp_bit_0
                name: Kompresor
                icon: mdi:hvac
              - entity: binary_sensor.acond_30045_hp_comp_bit_1
                name: Ventilátor
                icon: mdi:fan
              - entity: binary_sensor.acond_30045_hp_comp_bit_2
                name: Prim. čerp.
                icon: mdi:pump
              - entity: binary_sensor.acond_30007_tc_status_bit_4
                name: Sek. čerp. 1
                icon: mdi:pump
              - entity: binary_sensor.acond_30007_tc_status_bit_5
                name: Sek. čerp. 2
                icon: mdi:pump
              - entity: binary_sensor.acond_30007_tc_status_bit_8
                name: Odmrazování
                icon: mdi:snowflake-melt
              - entity: binary_sensor.acond_30007_tc_status_bit_3
                name: Ohřev TUV
                icon: mdi:water-boiler
              - entity: binary_sensor.acond_30007_tc_status_bit_10
                name: Letní provoz
                icon: mdi:weather-sunny

      # =====================================================================
      # 3. Aktuálně – Příkon / Výkon / COP / Otáčky + slider Max. výkon
      # =====================================================================
      - type: grid
        cards:
          - type: heading
            heading: ⚡ Aktuálně

          - type: glance
            columns: 4
            entities:
              - entity: sensor.acond_30027_aep
                name: Příkon
              - entity: sensor.acond_30028_ahp
                name: Výkon
              - entity: sensor.acond_30029_cop
                name: COP
              - entity: sensor.acond_30024_comp_rpm_actual
                # name vynecháno – dynamický friendly_name z entity

          - type: tile
            entity: number.acond_40014_comp_capacity_max_set
            features:
              - type: numeric-input
                style: slider

      # =====================================================================
      # 4. Teploty – glance přehled + 2×2 grid jediných tile karet
      # =====================================================================
      - type: grid
        cards:
          - type: heading
            heading: 🌡️ Teploty

          # --- Rychlý pohled: 6 teplot v 1 řádku ---
          - type: glance
            show_state: true
            show_name: true
            state_color: false
            columns: 6
            entities:
              - entity: sensor.acond_30002_t_act_indoor1
                name: Okruh 1
                icon: mdi:home-thermometer-outline
              - entity: sensor.acond_30004_t_act_indoor2
                name: Okruh 2
                icon: mdi:home-thermometer-outline
              - entity: sensor.acond_30006_t_act_tuv
                name: TUV
                icon: mdi:water-thermometer-outline
              - entity: sensor.acond_30009_t_act_water_back
                name: Zpátečka
                icon: mdi:thermometer-low
              - entity: sensor.acond_30018_t_act_water_outlet
                name: Topná voda
                icon: mdi:thermometer-high
              - entity: sensor.acond_30010_t_act_air
                name: Venkovní
                icon: mdi:weather-partly-cloudy

          # --- 2×2 grid jediných tile karet (vše v jedné kartě per okruh) ---
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: number.acond_40001_t_set_indoor1
                name: "Okruh 1 – zadání"
                icon: mdi:home-thermometer
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: number.acond_40003_t_set_indoor2
                name: "Okruh 2 – zadání"
                icon: mdi:home-thermometer
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: number.acond_40005_t_set_tuv
                name: "TUV – zadání"
                icon: mdi:water-thermometer
                features:
                  - type: numeric-input
                    style: buttons

              - type: tile
                entity: number.acond_40008_t_set_water_back
                name: "Zpátečka – zadání"
                icon: mdi:thermometer-low
                features:
                  - type: numeric-input
                    style: buttons

      # =====================================================================
      # 5. Graf teplot 24h – přes celou šířku view
      # =====================================================================
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 📈 Teploty (24 h)

          - type: history-graph
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - sensor.acond_30002_t_act_indoor1
              - sensor.acond_30004_t_act_indoor2
              - sensor.acond_30006_t_act_tuv
              - sensor.acond_30009_t_act_water_back
              - sensor.acond_30018_t_act_water_outlet
              - sensor.acond_30010_t_act_air

  - title: Přehled
    path: prehled
    icon: mdi:home-thermometer

    cards:
      - type: glance
        title: Stav tepelného čerpadla
        columns: 3
        entities:
          - entity: binary_sensor.acond_30007_tc_status_bit_0
            name: Zapnuto
          - entity: binary_sensor.acond_30007_tc_status_bit_1
            name: V provozu
          - entity: binary_sensor.acond_30007_tc_status_bit_2
            name: Porucha
          - entity: sensor.acond_30014_hp_mode
            name: Režim
          - entity: sensor.acond_30015_regulation_type
            name: Regulace
          - entity: sensor.acond_30021_err_number
            name: Poslední chyba

      - type: entities
        title: Topné okruhy a TUV
        entities:
          - type: section
            label: Okruh 1
          - entity: sensor.acond_30002_t_act_indoor1
            name: Aktuální teplota
          - entity: sensor.acond_30001_t_set_indoor1
            name: Požadovaná teplota
          - type: section
            label: Okruh 2
          - entity: sensor.acond_30004_t_act_indoor2
            name: Aktuální teplota
          - entity: sensor.acond_30003_t_set_indoor2
            name: Požadovaná teplota
          - type: section
            label: TUV
          - entity: sensor.acond_30006_t_act_tuv
            name: Aktuální teplota
          - entity: sensor.acond_30005_t_set_tuv
            name: Požadovaná teplota

      - type: entities
        title: Teploty vody a venkovní
        entities:
          - entity: sensor.acond_30010_t_act_air
            name: Venkovní teplota
          - entity: sensor.acond_30018_t_act_water_outlet
            name: Topná voda – výstup
          - entity: sensor.acond_30009_t_act_water_back
            name: Topná voda – zpátečka
          - entity: sensor.acond_30008_t_set_water_back
            name: Požadovaná zpátečka

      # --- Solár (podmíněné) ---
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.acond_30011_t_act_solar
            state_not: unavailable
          - condition: state
            entity: sensor.acond_30011_t_act_solar
            state_not: unknown
        card:
          type: entities
          title: Solární systém
          entities:
            - entity: sensor.acond_30011_t_act_solar
              name: Teplota panelu
            - entity: binary_sensor.acond_30007_tc_status_bit_6
              name: Cirkulace

      # --- Bazén (podmíněné) ---
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.acond_30012_t_act_pool
            state_not: unavailable
          - condition: state
            entity: sensor.acond_30012_t_act_pool
            state_not: unknown
        card:
          type: entities
          title: Bazén
          entities:
            - entity: sensor.acond_30012_t_act_pool
              name: Teplota bazénu
            - entity: sensor.acond_30013_t_set_pool
              name: Požadovaná teplota
            - entity: binary_sensor.acond_30007_tc_status_bit_7
              name: Cirkulace

      # --- Solanka (podmíněné – jen pro solankové TČ) ---
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.acond_30016_brine_temp
            state_not: unavailable
          - condition: state
            entity: sensor.acond_30016_brine_temp
            state_not: unknown
        card:
          type: entities
          title: Primární okruh (solanka)
          entities:
            - entity: sensor.acond_30016_brine_temp
              name: Teplota solanky
            - entity: binary_sensor.acond_30007_tc_status_bit_11
              name: Čerpadlo

      - type: glance
        title: Aktuální výkon
        columns: 3
        entities:
          - entity: sensor.acond_30027_aep
            name: Elektrický příkon
          - entity: sensor.acond_30028_ahp
            name: Tepelný výkon
          - entity: sensor.acond_30029_cop
            name: COP

  # =========================================================================
  # 2. OVLÁDÁNÍ – režim, setpointy, nebezpečné akce
  # =========================================================================
  - title: Ovládání
    path: ovladani
    icon: mdi:tune

    cards:
      - type: entities
        title: Režim TČ
        state_color: true
        entities:
          - entity: switch.acond_40006_tc_set_bit_0
            name: Automatický režim
            tap_action:
              action: toggle
              confirmation:
                text: Přepnout do automatického režimu?
          - entity: switch.acond_40006_tc_set_bit_1
            name: Pouze TČ
            tap_action:
              action: toggle
              confirmation:
                text: Přepnout do režimu „Pouze TČ"?
          - entity: switch.acond_40006_tc_set_bit_2
            name: Pouze bivalence (aux. topení)
            tap_action:
              action: toggle
              confirmation:
                text: Přepnout do bivalentního režimu (pouze aux. topení)?
          - entity: switch.acond_40006_tc_set_bit_4
            name: Chlazení
            tap_action:
              action: toggle
              confirmation:
                text: Přepnout do režimu chlazení?
          - entity: switch.acond_40006_tc_set_bit_3
            name: Vypnuto
            tap_action:
              action: toggle
              confirmation:
                text: "POZOR: Vypnutí odpojí tepelné čerpadlo. Pokračovat?"
          - entity: select.acond_40007_sel_regulation_type
            name: Typ regulace

      - type: entities
        title: Požadované teploty
        entities:
          - entity: number.acond_40001_t_set_indoor1
            name: Okruh 1
          - entity: number.acond_40003_t_set_indoor2
            name: Okruh 2
          - entity: number.acond_40005_t_set_tuv
            name: TUV
          - entity: number.acond_40008_t_set_water_back
            name: Zpátečka (manuální režim)

      - type: entities
        title: Teplota externích čidel
        entities:
          - type: section
            label: Hodnota externího čidla NAHRAZUJE interní čidlo TČ.
                   Pro vypnutí externího čidla použij tlačítko "Přepnout na interní čidlo".
          - entity: number.acond_40002_t_corr_indoor1
            name: Teplota místnosti okruh 1
          - entity: button.acond_40002_reset_t_corr_indoor1
            name: Přepnout na interní čidlo okruh 1
            icon: mdi:thermometer-off
          - entity: number.acond_40004_t_corr_indoor2
            name: Teplota místnosti okruh 2
          - entity: button.acond_40004_reset_t_corr_indoor2
            name: Přepnout na interní čidlo okruh 2
            icon: mdi:thermometer-off
          - entity: number.acond_40009_t_corr_air
            name: Venkovní teplota
          - entity: button.acond_40009_reset_t_corr_air
            name: Přepnout na interní venkovní čidlo
            icon: mdi:thermometer-off
          - entity: number.acond_40010_t_corr_solar
            name: Solární teplota
          - entity: button.acond_40010_reset_t_corr_solar
            name: Přepnout na interní solární čidlo
            icon: mdi:thermometer-off
          - entity: number.acond_40011_t_corr_pool
            name: Teplota bazénu
          - entity: button.acond_40011_reset_t_corr_pool
            name: Přepnout na interní bazénové čidlo
            icon: mdi:thermometer-off

      - type: entities
        title: Tichý provoz
        entities:
          - entity: switch.acond_40018_silent_mode_set
            name: Tichý provoz – ovládání
          - entity: number.acond_40019_silent_mode_start_set
            name: Začátek – nastavení (min od 00:00)
          - entity: number.acond_40020_silent_mode_stop_set
            name: Konec – nastavení (min od 00:00)
          - type: section
            label: Aktuální stav v TČ
          - entity: sensor.acond_30032_silent_mode
            name: Tichý provoz aktivní
          - entity: sensor.acond_30033_silent_mode_start
            name: Začátek (min od 00:00)
          - entity: sensor.acond_30034_silent_mode_stop
            name: Konec (min od 00:00)

      - type: entities
        title: Kompresor a oběhové čerpadlo
        entities:
          - entity: number.acond_40014_comp_capacity_max_set
            name: Max. výkon/otáčky kompresoru
          - entity: switch.acond_40016_manual_pwm_set
            name: Manuální řízení oběh. čerpadla – ovládání
          - entity: sensor.acond_30026_manual_pwm
            name: Manuální řízení – aktuální stav v TČ
          - entity: number.acond_40015_pwm_set
            name: Rychlost oběh. čerpadla
          - entity: switch.acond_40017_manual_eh_set
            name: Povolení bivalence

      # --- Solární ovládání (podmíněné) ---
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.acond_30011_t_act_solar
            state_not: unavailable
          - condition: state
            entity: sensor.acond_30011_t_act_solar
            state_not: unknown
        card:
          type: entities
          title: Solár
          entities:
            - entity: switch.acond_40006_tc_set_bit_6
              name: Solár zapnuto
              tap_action:
                action: toggle
                confirmation:
                  text: Přepnout solární okruh?

      # --- Bazénové ovládání (podmíněné) ---
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.acond_30012_t_act_pool
            state_not: unavailable
          - condition: state
            entity: sensor.acond_30012_t_act_pool
            state_not: unknown
        card:
          type: entities
          title: Bazén
          entities:
            - entity: switch.acond_40006_tc_set_bit_7
              name: Bazén zapnuto
              tap_action:
                action: toggle
                confirmation:
                  text: Přepnout bazénový okruh?
            - entity: number.acond_40012_t_set_pool
              name: Požadovaná teplota bazénu

      - type: entities
        title: Chlazení
        entities:
          - entity: number.acond_40013_t_set_water_outlet
            name: Požadovaná teplota výstupu
          - entity: sensor.acond_30019_t_set_water_outlet
            name: Aktuální nastavení v TČ

      # --- Nebezpečné akce – všechny s potvrzením ---
      - type: entities
        title: ⚠️ Servisní akce
        entities:
          - entity: button.acond_40006_tc_set_bit_5
            name: Potvrzení poruchy
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.acond_40006_tc_set_bit_5
              confirmation:
                text: Opravdu potvrdit aktuální poruchu? TČ se pokusí o restart.
          - entity: button.acond_40006_tc_set_bit_8
            name: Přepnout léto / zima
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.acond_40006_tc_set_bit_8
              confirmation:
                text: Přepnout provozní režim léto/zima?
          - entity: button.acond_40021_reset_plc_set
            name: Reset PLC
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.acond_40021_reset_plc_set
              confirmation:
                text: "POZOR: Reset PLC restartuje řídicí jednotku. Pokračovat jen pokud víte, co děláte!"

  # =========================================================================
  # 3. ENERGIE – výkon, COP, denní a celková spotřeba
  # =========================================================================
  - title: Energie
    path: energie
    icon: mdi:lightning-bolt

    cards:
      - type: glance
        title: Aktuální výkon a účinnost
        columns: 2
        entities:
          - entity: sensor.acond_30027_aep
            name: El. příkon
          - entity: sensor.acond_30028_ahp
            name: Tepelný výkon
          - entity: sensor.acond_30029_cop
            name: COP
          - entity: sensor.acond_30041_scop
            name: SCOP (sezónní)

      - type: entities
        title: Topení – dnes
        entities:
          - entity: sensor.acond_30039_ted
            name: Tepelná energie
          - entity: sensor.acond_30040_eed
            name: Elektrická energie

      - type: entities
        title: Topení – celkem
        entities:
          - entity: sensor.acond_30035_tes
            name: Tepelná energie
          - entity: sensor.acond_30037_ees
            name: Elektrická energie

      # --- Chlazení (podmíněné) ---
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.acond_30069_cooling_energy
            state_not: unavailable
          - condition: state
            entity: sensor.acond_30069_cooling_energy
            state_not: unknown
        card:
          type: entities
          title: Chlazení – energie
          entities:
            - type: section
              label: Dnes
            - entity: sensor.acond_30073_ced
              name: Chladicí energie
            - entity: sensor.acond_30074_eecd
              name: Elektrická energie chlazení
            - type: section
              label: Celkem
            - entity: sensor.acond_30069_cooling_energy
              name: Chladicí energie
            - entity: sensor.acond_30071_ece
              name: Elektrická energie chlazení

      - type: history-graph
        title: Výkon (24 h)
        hours_to_show: 24
        entities:
          - sensor.acond_30027_aep
          - sensor.acond_30028_ahp

      - type: history-graph
        title: COP (24 h)
        hours_to_show: 24
        entities:
          - sensor.acond_30029_cop

  # =========================================================================
  # 5. GRAFY – dlouhodobé statistiky (built-in statistics-graph + history-graph)
  # =========================================================================
  - title: Grafy
    path: grafy
    icon: mdi:chart-line

    cards:
      - type: markdown
        content: >
          **7denní statistiky** používají Long-Term Statistics z HA recorderu
          (hodinové průměry). **24h grafy** ukazují přímá data.

      # --- 7 dní: teploty (mean) ---
      - type: statistics-graph
        title: Teploty – 7 dní
        chart_type: line
        period: hour
        days_to_show: 7
        stat_types:
          - mean
        entities:
          - entity: sensor.acond_30002_t_act_indoor1
            name: Okruh 1
          - entity: sensor.acond_30006_t_act_tuv
            name: TUV
          - entity: sensor.acond_30010_t_act_air
            name: Venkovní
          - entity: sensor.acond_30018_t_act_water_outlet
            name: Topná voda – výstup
          - entity: sensor.acond_30009_t_act_water_back
            name: Topná voda – zpátečka

      # --- 7 dní: denní spotřeba energie (sum/state — co recorder uchovává) ---
      - type: statistics-graph
        title: Energie – 7 dní (denní spotřeba)
        chart_type: bar
        period: day
        days_to_show: 7
        stat_types:
          - state
        entities:
          - entity: sensor.acond_30039_ted
            name: Tepelná energie dnes (kWh)
          - entity: sensor.acond_30040_eed
            name: Elektrická energie dnes (kWh)

      # --- 7 dní: COP / SCOP ---
      - type: statistics-graph
        title: COP / SCOP – 7 dní
        chart_type: line
        period: hour
        days_to_show: 7
        stat_types:
          - mean
        entities:
          - entity: sensor.acond_30029_cop
            name: Topný faktor COP
          - entity: sensor.acond_30041_scop
            name: Sezónní SCOP

      # --- 24 h: tepelný výkon vs. elektrický příkon ---
      - type: history-graph
        title: Výkon (24 h)
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.acond_30028_ahp
            name: Tepelný výkon
          - entity: sensor.acond_30027_aep
            name: Elektrický příkon

      # --- 24 h: výstup vs. zpátečka (Δt diagnostika) ---
      - type: history-graph
        title: Topná voda – výstup vs. zpátečka (24 h)
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.acond_30018_t_act_water_outlet
            name: Výstup
          - entity: sensor.acond_30009_t_act_water_back
            name: Zpátečka

      # --- 7 dní: cyklování kompresoru ---
      - type: statistics-graph
        title: Cyklování kompresoru – 7 dní (mean rpm/h)
        chart_type: line
        period: hour
        days_to_show: 7
        stat_types:
          - mean
        entities:
          - entity: sensor.acond_30024_comp_rpm_actual
            name: Otáčky kompresoru

  # =========================================================================
  # 4. DIAGNOSTIKA – chyby, komponenty, chladivo, provozní hodiny
  # =========================================================================
  - title: Diagnostika
    path: diagnostika
    icon: mdi:wrench

    cards:
      # ---------- AI kontext export – nahoře, ať je vidět ----------
      - type: entities
        title: 🤖 Export AI kontextu pro Claude / ChatGPT
        show_header_toggle: false
        entities:
          - type: section
            label: Vytvoří markdown soubor s diagnostikou a nabídne ho ke stažení
          - entity: button.acond_ai_context_acond
            name: Jen acond entity (rychlé, malý soubor)
            icon: mdi:robot-outline
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.acond_ai_context_acond
          - entity: button.acond_ai_context_full
            name: Celé HA (velký soubor – pozor na secrets!)
            icon: mdi:robot
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.acond_ai_context_full
              confirmation:
                text: >-
                  Export celé HA konfigurace může obsahovat citlivé údaje
                  z jiných integrací (IP adresy, e-maily, tokeny v webhoocích).
                  Automatická redakce zachytí běžné secrets, ale není 100%.
                  Před odesláním do AI si soubor projdi. Pokračovat?
          - type: section
            label: Po stisknutí najdeš download link v notifikacích (zvonek vpravo nahoře)

      - type: markdown
        content: |
          ## Co je AI kontext?

          Dva exporty pro diagnostiku integrace ve spolupráci s AI asistentem:

          - **Jen acond entity** – jen entity, automatizace, zařízení a logy
            týkající se integrace Acond. Bezpečnější varianta pro sdílení.
          - **Celé HA** – všechny integrace, pokud problém spojený s acondem
            může souviset s něčím jiným v HA.

          Soubor se ukládá do `/config/acond_ai_context/` jako markdown
          (`acond_only_YYYYMMDD_HHMMSS.md` nebo `full_YYYYMMDD_HHMMSS.md`)
          a po vytvoření přijde **persistent notification s klikacím download
          linkem**.

          Před odesláním do AI si soubor vždy projdi – automatická redakce
          nahrazuje hodnoty u klíčů typu `password`, `token`, `secret`,
          `webhook` apod., ale **nezachytí všechno** (IP, e-maily, GPS, jména).


      - type: entities
        title: Chybové kódy
        entities:
          - entity: sensor.acond_30021_err_number
            name: Stav TČ
          - entity: sensor.acond_30023_err_number_driver
            name: Stav driveru

      - type: glance
        title: Stav komponent
        show_state: true
        state_color: true
        columns: 4
        entities:
          - entity: binary_sensor.acond_30045_hp_comp_bit_0
            name: Kompresor
          - entity: binary_sensor.acond_30045_hp_comp_bit_1
            name: Ventilátor
          - entity: binary_sensor.acond_30045_hp_comp_bit_2
            name: Prim. čerp.
          - entity: binary_sensor.acond_30045_hp_comp_bit_3
            name: Rev. ventil

      - type: glance
        title: Stavové bity TČ
        show_state: true
        state_color: true
        columns: 4
        entities:
          - entity: binary_sensor.acond_30007_tc_status_bit_3
