      - type: markdown
        title: Přizpůsobení dashboardu
        content: |
          Tento dashboard je v **YAML módu** – klik na tužku ti zobrazí
          hlášku *"V režimu YAML není dostupné uživatelské rozhraní pro
          úpravy"*. Záměrně – chceme ti dál posílat updates integrace,
          které se přes statický YAML soubor přepisují automaticky.

          ### Pokud si chceš vytvořit vlastní upravitelnou kopii:

          1. V HA jdi do **Settings → Dashboards → + Přidat dashboard
             → Nový dashboard** a pojmenuj ho podle sebe (např. *Můj Acond*)
          2. Otevři nově vytvořený dashboard v postranním menu
          3. Klikni na **tužku** (vpravo nahoře) → tři tečky **⋮**
             → **Editor kódu nastavení**
          4. Smaž výchozí obsah a **vlož celý YAML** z našeho souboru
             `acond_dashboard.yaml`
          5. Najdi hned na začátku řádek `title: Acond TČ` a **přepiš
             ho na svůj název panelu** (jinak budeš mít v menu dvě "Acond TČ")
          6. Klikni **Save**

          Kde najít obsah našeho YAMLu: otevři v HA addonu **File editor**
          nebo přes SSH soubor
          `/config/custom_components/acond/lovelace/acond_dashboard.yaml`
          a zkopíruj jeho celý obsah.

          ### Jak na updates z naší strany

          Po každém update integrace (HACS / ručně) obsahuje soubor
          `acond_dashboard.yaml` **nejnovější verzi** se všemi vylepšeními.
          Hned na začátku souboru najdeš **changelog** v komentáři –
          tam vidíš, co se změnilo. Pokud chceš novinky ve své kopii,
          zkopíruj soubor znovu a v Editoru kódu nastavení proveď diff/merge
          se svými úpravami.

          ⚠️ **Pozor:** Tvoje úpravy přežijí update integrace (žijí
          v HA storage), ale **naše vylepšení dashboardu se k tvé kopii
          automaticky nedostávají**. Sync ze souboru je manuální.

      - type: markdown
        title: Vzory pro automatizace
        content: |
          ## Specifika této integrace oproti YAML Modbus

          ### 1. Textové senzory – používej raw_value

          Senzory jako **Režim TČ** nebo **Typ regulace** zobrazují text, ale pro
          automatizace je spolehlivější číselný atribut `raw_value` – ten se nemění
          při přejmenování.

          ```yaml
          # Správně – stabilní číselná hodnota
          condition:
            - condition: template
              value_template: >
                {{ state_attr('sensor.acond_30015_regulation_type', 'raw_value') == 2 }}

          # Hodnoty pro Typ regulace:
          # 0 = AcondTherm
          # 1 = Equiterm
          # 2 = Standard

          # Hodnoty pro Režim TČ (sensor.acond_30014_hp_mode):
          # 0 = Automatický
          # 1 = Pouze TČ
          # 3 = Pouze aux. topení
          # 4 = Vypnuto
          # 5 = Manuální
          # 6 = Chlazení
          ```

          ### 2. Hodiny provozu – používej atribut runtime

          Každý hodinový senzor má atribut `runtime` kombinující hodiny a minuty:

          ```yaml
          # Zobrazení v šabloně
          {{ state_attr('sensor.acond_30050_compressor_hours', 'runtime') }}
          # Výsledek: "1234 h 27 min"

          # Podmínka – kompresor jel více než 1000 hodin
          condition:
            - condition: numeric_state
              entity_id: sensor.acond_30050_compressor_hours
              above: 1000
          ```

          ### 3. Tichý provoz – čas v minutách od půlnoci

          Senzory 30033 a 30034 vrací minuty od půlnoci. Atribut `time` obsahuje
          čitelný formát:

          ```yaml
          # Čitelný čas
          {{ state_attr('sensor.acond_30033_silent_mode_start', 'time') }}
          # Výsledek: "06:30"

          # Zápis nového času přes number entitu (v minutách)
          service: number.set_value
          target:
            entity_id: number.acond_40019_silent_mode_start_set
          data:
            value: 390   # = 06:30
          ```

          ### 4. Nastavení teploty

          ```yaml
          # Nastav teplotu TUV na 45 °C
          service: number.set_value
          target:
            entity_id: number.acond_40005_t_set_tuv
          data:
            value: 45.0
          ```

          ### 5. Přepínání režimů TČ

          ```yaml
          # Zapni automatický režim
          service: switch.turn_on
          target:
            entity_id: switch.acond_40006_tc_set_bit_0

          # Přepni na režim bivalence
          service: switch.turn_on
          target:
            entity_id: switch.acond_40006_tc_set_bit_2
          ```

          ### 6. Potvrzení poruchy a reset PLC

          ```yaml
          # Potvrď poruchu (tlačítko)
          service: button.press
          target:
            entity_id: button.acond_40006_tc_set_bit_5

          # Reset PLC – pozor, TČ se restartuje!
          service: button.press
          target:
            entity_id: button.acond_40021_reset_plc_set
          ```

          ### 7. Podmínka na stav TČ (binární senzor)

          ```yaml
          # Je TČ v provozu?
          condition:
            - condition: state
              entity_id: binary_sensor.acond_30007_tc_status_bit_1
              state: "on"

          # Probíhá odmrazování?
          condition:
            - condition: state
              entity_id: binary_sensor.acond_30007_tc_status_bit_8
              state: "on"
          ```

          ### 8. Spuštění AI kontext exportu

          ```yaml
          # Při poruše TČ automaticky vygeneruj export pro AI
          automation:
            - alias: "Acond – AI export při poruše"
              trigger:
                - platform: state
                  entity_id: binary_sensor.acond_30007_tc_status_bit_2
                  to: "on"
              action:
                - service: button.press
                  target:
                    entity_id: button.acond_ai_context_acond
          ```
