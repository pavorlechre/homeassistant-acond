            name: TC_status (raw word)
          - entity: sensor.acond_30045_hp_component_status
            name: HP_component_status (raw word)

      - type: entities
        title: Další
        entities:
          - entity: sensor.acond_30017_heartbeat
            name: Heartbeat (čítač komunikace)
          - entity: sensor.acond_30044_thermal_power
            name: Třída tepelného výkonu
          - entity: sensor.acond_30068_reset_plc
            name: Stav resetu PLC


  # =========================================================================
  # 6. APLIKACE ACOND – odkaz na webový panel TČ (TecoRoute, nové okno)
  # =========================================================================
  - title: Aplikace Acond
    path: aplikace-acond
    icon: mdi:web

    cards:
      - type: markdown
        content: |
          ## 🌐 Aplikace Acond

          Webové rozhraní TČ pro nastavení toho, co Modbus neumí –
          rozvrh blokace TUV, ekvitermní křivka, podrobné parametry.

          Klikni na tlačítko níže – panel se otevře v novém okně
          prohlížeče. Funguje **odkudkoli** (i mimo domov), na desktopu
          i na mobilu.

          Pro přihlášení použij **login a heslo z Acondu**. Pokud máš
          v TecoRoute portálu vygenerován **trvalý autologin odkaz**,
          při dalším otevření tě cloud rovnou přesměruje do panelu.

      - type: button
        name: Otevřít panel TČ v novém okně
        icon: mdi:open-in-new
        icon_height: 48px
        tap_action:
          action: url
          url_path: https://route3.tecomat.com/TR_LOGIN.XML
        show_state: false

